# Mneme 配置文件示例
# 复制为 mneme.toml 并根据需要修改

[llm]
provider = "anthropic"           # "anthropic" | "openai" | "deepseek" | "ollama" | "mock"
model = "claude-sonnet-4-5-20250929"
# base_url = "https://custom-endpoint.example.com/v1"  # 自定义 API 端点（代理/中转）
max_tokens = 4096
temperature = 0.7
context_budget_chars = 32000     # 上下文预算（字符数），约等于 model context window / 4
timeout_secs = 120               # LLM API 请求超时（秒）
# low_res_model = "qwen2:0.5b"  # 低分辨率内心独白模型（需本地 Ollama）

[safety]
tier = "restricted"              # "read_only" | "restricted" | "full"
allowed_paths = ["."]            # Restricted 模式下允许写入的路径
blocked_commands = [
    "rm -rf /",
    "rm -rf /*",
    "mkfs",
    "dd if=",
    ":(){ :|:& };:",
    "sudo rm",
    "> /dev/sda",
]
network_whitelist = []           # 空 = 允许所有；非空 = 仅允许列出的域名
require_confirmation = true      # 危险操作前是否需要确认

[token_budget]
# daily_limit = 100000          # 每日 token 上限（不设置 = 无限制）
# monthly_limit = 3000000       # 每月 token 上限
warning_threshold = 0.8          # 80% 时发出警告
degradation_strategy = "hard_stop"  # "hard_stop" | { degrade = { max_tokens_cap = 1024 } }

[organism]
db_path = "mneme.db"
persona_dir = "persona"
language = "zh"                  # 系统提示语言："zh" | "en"（persona 内容不受影响）
tick_interval_secs = 10
trigger_interval_secs = 60
proactivity = 0.5                # 主动性（0.0=沉默, 1.0=最大）

# 日程计划（可选，不配置则默认 morning_greeting 8:00 + evening_summary 21:00）
# [[organism.schedules]]
# name = "morning_greeting"
# hour = 8
# minute = 0
# tolerance_minutes = 5
# # route = "onebot:group:12345"  # 可选：指定输出渠道

# [[organism.schedules]]
# name = "evening_summary"
# hour = 21
# minute = 0

# [onebot]
# ws_url = "ws://localhost:8080"
# access_token = "your-token-here"

